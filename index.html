<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExecutePro v15 - Master Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <style>
        * { font-style: normal !important; font-family: 'Inter', sans-serif; font-weight: 900 !important; text-transform: uppercase !important; }
        input, select, textarea { font-size: 14px !important; border-width: 2px !important; }
        .aba-ativa { border-bottom: 4px solid #3b82f6; color: #3b82f6; }
        .column-bar { transition: height 0.6s ease; min-width: 60px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 leading-tight">
    <div id="loading-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center text-white text-xl text-center px-4 font-black">SINCRONIZANDO SISTEMA CLOUD...</div>

    <!-- MODAL FOTO -->
    <div id="modal-foto" class="hidden fixed inset-0 bg-slate-900/95 z-[110] flex items-center justify-center p-4 backdrop-blur-sm" onclick="fecharModalFoto()">
        <div class="max-w-4xl w-full flex flex-col items-center">
            <button class="self-end text-white bg-red-600 px-6 py-2 rounded-xl mb-2 font-black uppercase">FECHAR ✕</button>
            <img id="img-ampliada" class="max-h-[80vh] rounded-2xl shadow-2xl border-4 border-white" src="">
        </div>
    </div>

    <!-- MODAL EDIÇÃO (CORRIGIDO) -->
    <div id="modal-edit" class="hidden fixed inset-0 bg-slate-900/70 z-[90] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl border-t-[12px] border-yellow-500 p-8">
            <h3 class="text-xl mb-6 flex justify-between font-black uppercase">EDITAR PLANO <button onclick="fecharModal()" class="text-slate-400">✕</button></h3>
            <form id="form-edit" class="space-y-4 font-black">
                <input type="hidden" id="edit-id">
                <div><label class="text-[10px] text-slate-400">TÍTULO</label><input type="text" id="edit-titulo" class="w-full p-3 border rounded-xl bg-slate-50 outline-none font-black uppercase"></div>
                <div><label class="text-[10px] text-slate-400">RESPONSÁVEL</label><select id="edit-responsavel" class="w-full p-3 border rounded-xl bg-slate-50 outline-none font-black uppercase"></select></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] text-slate-400 font-black">INÍCIO</label><input type="date" id="edit-data-inicio" class="w-full p-3 border rounded-xl outline-none font-black"></div>
                    <div><label class="text-[10px] text-slate-400 font-black uppercase font-black">PRAZO</label><input type="date" id="edit-data-fim" class="w-full p-3 border rounded-xl outline-none font-black"></div>
                </div>
                <button type="submit" class="w-full bg-yellow-500 text-white py-4 rounded-xl shadow-lg font-black uppercase">SALVAR ALTERAÇÕES</button>
            </form>
        </div>
    </div>

    <nav class="bg-slate-900 text-white p-5 sticky top-0 z-40 shadow-2xl border-b-4 border-blue-600 font-black uppercase">
        <div class="container mx-auto flex justify-between items-center">
            <span class="text-blue-400 text-xl font-black">EXECUTE PRO <span class="text-white text-[10px] ml-1 opacity-50 font-black uppercase">V15 MASTER</span></span>
            <div class="flex gap-6 text-[11px] items-center font-black">
                <button id="btn-lock" onclick="verificarSenha()" class="bg-red-600 px-3 py-1.5 rounded-lg shadow-inner font-black uppercase">🔒 LEITURA</button>
                <button onclick="mudarAba('lista')" id="tab-ativos" class="aba-ativa font-black pb-1 uppercase transition">📝 ATIVOS</button>
                <button onclick="mudarAba('concluidos')" id="tab-concluidos" class="font-black pb-1 uppercase transition">✅ CONCLUÍDOS</button>
                <button onclick="mudarAba('dashboard')" id="tab-dash" class="font-black pb-1 uppercase transition tracking-tighter">📊 DASHBOARD</button>
                <button onclick="abrirConfig()" class="bg-slate-700 p-2 rounded-lg font-black uppercase">⚙️</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-8 font-black uppercase">
        <div class="mb-6 bg-white p-4 rounded-2xl shadow border-2 border-blue-100 flex flex-col md:flex-row items-center gap-4 font-black uppercase">
            <span class="text-[10px] text-slate-400 tracking-widest font-black uppercase">FILTRAR POR RESPONSÁVEL:</span>
            <select id="filtro-pessoa" onchange="renderLista()" class="flex-1 p-3 border-2 border-blue-50 rounded-xl text-sm bg-blue-50 text-blue-900 outline-none font-black uppercase cursor-pointer"></select>
            <button onclick="limparFiltro()" class="text-[10px] bg-slate-200 px-6 py-3 rounded-xl hover:bg-slate-300 font-black uppercase">LIMPAR</button>
        </div>

        <div id="aba-lista-container" class="flex flex-col lg:flex-row gap-8 font-black uppercase">
            <div id="box-form" class="lg:w-1/3 bg-white p-8 rounded-3xl shadow-xl border-t-[12px] border-blue-600 h-fit sticky top-28 font-black uppercase uppercase font-black uppercase">
                <h3 class="text-xs mb-8 text-slate-800 border-b-2 pb-4 tracking-widest font-black uppercase italic">NOVO PLANO DE AÇÃO</h3>
                <form id="form-plano" class="space-y-6 font-black uppercase">
                    <input type="text" id="titulo" required class="w-full p-4 border-2 rounded-2xl text-sm bg-slate-50 font-black outline-none focus:border-blue-600 uppercase" placeholder="TÍTULO DA TAREFA">
                    <select id="responsavel" required class="w-full p-4 border-2 rounded-2xl text-sm bg-blue-50 text-blue-900 font-black outline-none cursor-pointer uppercase"></select>
                    <div class="grid grid-cols-2 gap-4 text-[10px] text-slate-400 font-black uppercase">
                        <div>DATA INÍCIO<input type="date" id="data_inicio" required class="w-full p-3 border-2 rounded-xl text-xs text-gray-700 mt-1 outline-none font-black uppercase uppercase"></div>
                        <div>PRAZO FINAL<input type="date" id="data_conclusao" required class="w-full p-3 border-2 rounded-xl text-xs text-gray-700 mt-1 outline-none font-black uppercase uppercase"></div>
                    </div>
                    <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition font-black uppercase uppercase italic">GRAVAR NA NUVEM</button>
                </form>
            </div>

            <div id="box-lista" class="lg:w-2/3 space-y-4 font-black uppercase tracking-tighter">
                <div class="bg-slate-800 text-white p-4 rounded-t-3xl text-[10px] flex justify-between items-center tracking-widest font-black uppercase uppercase font-black uppercase">
                    <span id="txt-aba">MONITORAMENTO DE EXECUÇÃO</span>
                    <span class="text-blue-400 font-black underline uppercase uppercase">LIVE CLOUD SYNC 📡</span>
                </div>
                <div id="lista-planos" class="space-y-4 font-black uppercase font-black tracking-tighter"></div>
            </div>
        </div>

        <div id="aba-dashboard" class="hidden font-black uppercase uppercase font-black">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 text-center font-black uppercase font-black uppercase">
                <div class="bg-white p-6 rounded-3xl shadow border-b-8 border-blue-500 font-black">TOTAL<h2 id="dash-total" class="text-4xl text-slate-800 font-black italic">0</h2></div>
                <div class="bg-white p-6 rounded-3xl shadow border-b-8 border-red-600 font-black text-red-500 font-black uppercase">ATRASADOS<h2 id="dash-atrasados" class="text-4xl font-black italic">0</h2></div>
                <div class="bg-white p-6 rounded-3xl shadow border-b-8 border-yellow-500 font-black text-yellow-600 font-black uppercase font-black uppercase">EM CURSO<h2 id="dash-andamento" class="text-4xl font-black italic uppercase">0</h2></div>
                <div class="bg-white p-6 rounded-3xl shadow border-b-8 border-green-500 font-black text-green-600 font-black uppercase font-black uppercase uppercase">CONCLUÍDOS<h2 id="dash-concluidos" class="text-4xl font-black italic">0</h2></div>
            </div>
            <div id="chart-container" class="bg-white p-12 rounded-3xl shadow h-96 flex justify-around items-end gap-4 relative font-black uppercase uppercase font-black"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFka2_7e9ktqZ3omV8lHBBuzd1Wd88emA",
            authDomain: "executepro-ff108.firebaseapp.com",
            projectId: "executepro-ff108",
            storageBucket: "executepro-ff108.appspot.com",
            messagingSenderId: "862620727559",
            appId: "1:862620727559:web:4515840f5eea40c64f6da2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let dadosGerais = [];
        let abaAtual = 'lista';
        let gestorAutenticado = false;

        function mudarAba(aba) {
            abaAtual = aba;
            const boxForm = document.getElementById('box-form');
            const boxLista = document.getElementById('box-lista');
            document.getElementById('aba-lista-container').classList.toggle('hidden', aba === 'dashboard');
            document.getElementById('aba-dashboard').classList.toggle('hidden', aba !== 'dashboard');
            if (aba === 'concluidos') {
                boxForm.classList.add('hidden'); boxLista.classList.replace('lg:w-2/3', 'w-full');
                document.getElementById('txt-aba').innerText = 'AUDITORIA DE EVIDÊNCIAS (CONCLUÍDOS)';
            } else {
                boxForm.classList.remove('hidden'); boxLista.classList.replace('w-full', 'lg:w-2/3');
                document.getElementById('txt-aba').innerText = 'MONITORAMENTO DE EXECUÇÃO';
            }
            renderLista();
            if(aba === 'dashboard') renderDashboard();
        }

        function verificarSenha() {
            if (gestorAutenticado) { gestorAutenticado = false; atualizarPermissoes(); return; }
            if (prompt("SENHA GESTOR:") === "1570") { gestorAutenticado = true; atualizarPermissoes(); } else { alert("NEGADO!"); }
        }

        function atualizarPermissoes() {
            const btn = document.getElementById('btn-lock');
            btn.innerText = gestorAutenticado ? "🔓 MODO GESTOR" : "🔒 MODO LEITURA";
            btn.className = gestorAutenticado ? "bg-green-600 px-4 py-2 rounded-xl shadow-lg font-black uppercase" : "bg-red-600 px-4 py-2 rounded-xl shadow-inner font-black uppercase";
            renderLista(); 
        }

        async function anexarEvidencia(id) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            // REMOVIDO capture="environment" para permitir escolher da Galeria ou Câmera
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const container = document.getElementById(`upload-container-${id}`);
                container.innerHTML = "<p class='animate-pulse text-blue-600 font-black uppercase'>⏳ PROCESSANDO EVIDÊNCIA...</p>";
                try {
                    const ref = storage.ref(`evidencias/${id}`);
                    await ref.put(file);
                    const url = await ref.getDownloadURL();
                    await db.collection("planos").doc(id).update({ evidenciaUrl: url });
                    alert("EVIDÊNCIA SALVA!");
                } catch (err) { alert("ERRO NO STORAGE!"); }
            };
            input.click();
        }

        function abrirEdicao(id) {
            if (!gestorAutenticado) return;
            const p = dadosGerais.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-titulo').value = p.titulo;
            document.getElementById('edit-responsavel').value = p.responsavel;
            document.getElementById('edit-data-inicio').value = p.data_inicio;
            document.getElementById('edit-data-fim').value = p.data_conclusao;
            document.getElementById('modal-edit').classList.remove('hidden');
        }

        // SINCRONIZAÇÃO DE NOMES (POPULA DROPDOWNS)
        db.collection("responsaveis").onSnapshot(snap => {
            const selectPrincipal = document.getElementById('responsavel');
            const selectEdicao = document.getElementById('edit-responsavel');
            const config = document.getElementById('lista-nomes-config');
            
            selectPrincipal.innerHTML = '<option value="" disabled selected>ESCOLHER...</option>';
            selectEdicao.innerHTML = '<option value="" disabled selected>ESCOLHER...</option>';
            config.innerHTML = '';

            snap.forEach(doc => {
                const n = doc.data().nome;
                selectPrincipal.innerHTML += `<option value="${n}">${n}</option>`;
                selectEdicao.innerHTML += `<option value="${n}">${n}</option>`;
                config.innerHTML += `<div class="flex justify-between items-center bg-white p-3 border-2 rounded-xl mb-1 uppercase font-black text-xs uppercase"><span>${n}</span><button onclick="excluirNome('${doc.id}')" class="text-red-500 font-black uppercase">✕</button></div>`;
            });
        });

        // SINCRONIZAÇÃO DE PLANOS
        db.collection("planos").onSnapshot(snap => {
            document.getElementById('loading-overlay').classList.add('hidden');
            dadosGerais = [];
            snap.forEach(doc => dadosGerais.push({id: doc.id, ...doc.data()}));
            
            const filtroSelect = document.getElementById('filtro-pessoa');
            const valorSalvo = filtroSelect.value || "TODOS";
            const nomesComAcao = [...new Set(dadosGerais.map(p => p.responsavel))].sort();
            filtroSelect.innerHTML = '<option value="TODOS">MOSTRAR TODOS OS NOMES</option>';
            nomesComAcao.forEach(n => filtroSelect.innerHTML += `<option value="${n}">${n}</option>`);
            filtroSelect.value = valorSalvo;

            renderLista();
            if(abaAtual === 'dashboard') renderDashboard();
        });

        function renderLista() {
            const lista = document.getElementById('lista-planos');
            const filtro = document.getElementById('filtro-pessoa').value;
            lista.innerHTML = '';
            
            let filtrados = dadosGerais.filter(p => (abaAtual === 'concluidos') ? p.status === 'Concluído' : p.status !== 'Concluído');
            if (filtro !== "TODOS") filtrados = filtrados.filter(p => p.responsavel === filtro);
            
            filtrados.forEach(p => {
                const diff = moment(p.data_conclusao).startOf('day').diff(moment().startOf('day'), 'days');
                let cor = "bg-green-500";
                if (p.status === 'Concluído') cor = "bg-green-600";
                else if (p.status === 'Em andamento') cor = "bg-yellow-400 shadow-md";
                else { cor = "bg-blue-500"; if (diff < 0) cor = "bg-red-600 animate-pulse shadow-lg"; }

                let evidenciaHTML = "";
                if (abaAtual === 'concluidos') {
                    evidenciaHTML = p.evidenciaUrl ? 
                        `<div class="mt-4 p-4 bg-blue-50 border-2 border-blue-200 rounded-2xl flex items-center gap-4 cursor-pointer" onclick="ampliarFoto('${p.evidenciaUrl}')"><img src="${p.evidenciaUrl}" class="w-20 h-20 rounded-xl object-cover border-2 border-white shadow-md"><div><p class="text-[10px] text-blue-600 font-black uppercase">PROVA AUDITADA ✅</p><p class="text-xs text-blue-900 font-black underline uppercase uppercase">CLIQUE PARA VER</p></div></div>` :
                        `<div id="upload-container-${p.id}" class="mt-4 p-6 border-2 border-dashed border-slate-300 rounded-2xl text-center bg-slate-50 cursor-pointer hover:bg-slate-100" onclick="anexarEvidencia('${p.id}')"><p class="text-xs text-slate-600 font-black uppercase">📷 ANEXAR FOTO (CÂMERA OU ARQUIVO)</p></div>`;
                }

                lista.innerHTML += `
                    <div class="p-6 bg-white rounded-3xl shadow-md border-l-[14px] ${p.status === 'Concluído' ? 'border-green-500' : (diff < 0 ? 'border-red-600' : 'border-slate-300')} flex flex-col md:flex-row gap-6 items-start md:items-center font-black uppercase uppercase">
                        <div class="flex-1 w-full font-black uppercase">
                            <div class="flex items-center gap-3 mb-2 font-black uppercase">
                                <div class="h-4 w-4 rounded-full ${cor} border-2 border-white font-black uppercase"></div>
                                <span class="text-sm text-blue-800 font-black uppercase font-black uppercase">${p.responsavel}</span>
                                <span class="text-[10px] text-slate-400 font-black ml-auto font-black uppercase uppercase font-black uppercase">VENCIMENTO: ${moment(p.data_conclusao).format('DD/MM/YYYY')}</span>
                            </div>
                            <h2 class="text-base text-slate-800 leading-tight mb-4 font-black uppercase uppercase font-black uppercase uppercase">${p.titulo}</h2>
                            <textarea onblur="mudarObs('${p.id}', this.value)" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs text-red-600 font-black uppercase outline-none focus:bg-white min-h-[50px] font-black uppercase uppercase" placeholder="PENDÊNCIAS...">${p.observacao || ''}</textarea>
                            ${evidenciaHTML}
                        </div>
                        <div class="w-full md:w-auto flex items-center gap-4 bg-slate-100 p-4 rounded-3xl font-black uppercase uppercase">
                            <select onchange="mudarStatus('${p.id}', this.value)" class="flex-1 p-3 border-2 border-white rounded-xl bg-white text-xs font-black uppercase uppercase font-black uppercase">
                                <option ${p.status==='Não iniciado'?'selected':''}>Não iniciado</option>
                                <option ${p.status==='Em andamento'?'selected':''}>Em andamento</option>
                                <option ${p.status==='Concluído'?'selected':''}>Concluído</option>
                            </select>
                            <div class="flex gap-2 ${!gestorAutenticado ? 'hidden' : ''}">
                                <button onclick="abrirEdicao('${p.id}')" class="text-blue-600 text-2xl font-black px-2 uppercase uppercase">✏️</button>
                                <button onclick="deletarPlano('${p.id}')" class="text-red-500 text-2xl font-black px-2 uppercase uppercase font-black uppercase">✕</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        // Funções de Suporte (Lógica básica)
        function fecharModal() { document.getElementById('modal-edit').classList.add('hidden'); }
        document.getElementById('form-edit').addEventListener('submit', async (e) => { e.preventDefault(); await db.collection("planos").doc(document.getElementById('edit-id').value).update({ titulo: document.getElementById('edit-titulo').value.toUpperCase(), responsavel: document.getElementById('edit-responsavel').value, data_inicio: document.getElementById('edit-data-inicio').value, data_conclusao: document.getElementById('edit-data-fim').value }); fecharModal(); });
        async function mudarStatus(id, status) { await db.collection("planos").doc(id).update({ status }); }
        async function mudarObs(id, obs) { await db.collection("planos").doc(id).update({ observacao: obs.toUpperCase() }); }
        function ampliarFoto(url) { document.getElementById('img-ampliada').src = url; document.getElementById('modal-foto').classList.remove('hidden'); }
        function fecharModalFoto() { document.getElementById('modal-foto').classList.add('hidden'); }
        function abrirConfig() { if (!gestorAutenticado) return alert("NEGADO!"); document.getElementById('config-section').classList.remove('hidden'); }
        function fecharConfig() { document.getElementById('config-section').classList.add('hidden'); }
        async function adicionarNome() { const i = document.getElementById('novo-nome'); if (i.value.trim()) { await db.collection("responsaveis").add({ nome: i.value.trim().toUpperCase() }); i.value = ""; } }
        async function excluirNome(id) { if(confirm("REMOVER?")) await db.collection("responsaveis").doc(id).delete(); }
        function limparFiltro() { document.getElementById('filtro-pessoa').value = "TODOS"; renderLista(); }
        const form = document.getElementById('form-plano'); form.addEventListener('submit', async (e) => { e.preventDefault(); await db.collection("planos").add({ titulo: document.getElementById('titulo').value.toUpperCase(), responsavel: document.getElementById('responsavel').value, data_inicio: document.getElementById('data_inicio').value, data_conclusao: document.getElementById('data_conclusao').value, status: "Não iniciado", observacao: "", timestamp: Date.now(), evidenciaUrl: "" }); form.reset(); });
        function renderDashboard() { const t=dadosGerais.length, c=dadosGerais.filter(p=>p.status==='Concluído').length; document.getElementById('dash-total').innerText=t; document.getElementById('dash-concluidos').innerText=c; document.getElementById('dash-andamento').innerText=dadosGerais.filter(p=>p.status==='Em andamento').length; document.getElementById('dash-atrasados').innerText=dadosGerais.filter(p=>p.status!=='Concluído' && moment(p.data_conclusao).diff(moment().startOf('day'),'days')<0).length; document.getElementById('dash-taxa').innerText=t>0?Math.round((c/t)*100)+"%":"0%"; const cont=document.getElementById('chart-container'); cont.innerHTML=''; [{key:'Não iniciado',label:'PENDENTE',color:'bg-blue-500'},{key:'Em andamento',label:'EM CURSO',color:'bg-yellow-400'},{key:'Concluído',label:'FINALIZADO',color:'bg-green-500'}].forEach(cfg=>{ const qtd=dadosGerais.filter(p=>p.status===cfg.key).length; const alt=t>0?(qtd/t*100):0; cont.innerHTML+=`<div class="flex flex-col items-center flex-1 h-full justify-end font-black"><span class="text-3xl">${qtd}</span><span class="text-[10px] text-slate-400 mb-2">${Math.round(alt)}%</span><div class="column-bar w-20 md:w-32 ${cfg.color} rounded-t-2xl shadow-xl" style="height: ${Math.max(alt*2.5,15)}px"></div><span class="mt-4 text-[10px] bg-white px-4 py-2 rounded-full border shadow-sm font-black uppercase font-black uppercase font-black uppercase">${cfg.label}</span></div>`; }); }
    </script>
</body>
</html>
