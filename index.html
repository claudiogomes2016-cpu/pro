<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExecutePro BI - Full Color Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { font-style: normal !important; font-family: 'Inter', sans-serif; font-weight: 800 !important; text-transform: uppercase !important; letter-spacing: -0.01em; }
        .aba-ativa { border-bottom: 4px solid #2563eb; color: #2563eb; }
        .drawer { transition: transform 0.3s ease-in-out; }
        .bi-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); overflow: hidden; border: 1px solid #e2e8f0; }
        .critical-glow { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-900 leading-tight">

    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex items-center justify-center font-black text-blue-600 text-xl uppercase italic">Sincronizando Nuvem...</div>

    <!-- SIDE DRAWER (CADASTRO) -->
    <div id="drawer-form" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl z-[90] translate-x-full drawer border-l border-slate-200">
        <div class="p-8 h-full flex flex-col uppercase font-black">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h3 class="text-xl text-blue-600 uppercase">Novo Plano de Ação</h3>
                <button onclick="toggleForm()" class="text-slate-400 text-3xl font-black">✕</button>
            </div>
            <form id="form-plano" class="space-y-6">
                <div><label class="text-[10px] text-slate-400 mb-2 block font-black">Descrição da Tarefa</label><input type="text" id="titulo" required class="w-full p-4 border-2 border-slate-100 rounded-xl bg-slate-50 font-black outline-none focus:border-blue-600"></div>
                <div><label class="text-[10px] text-slate-400 mb-2 block font-black">Responsável</label><select id="responsavel" required class="w-full p-4 border-2 border-slate-100 rounded-xl bg-slate-50 font-black outline-none cursor-pointer"></select></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] text-slate-400 mb-2 block font-black uppercase">Início</label><input type="date" id="data_inicio" required class="w-full p-4 border rounded-xl text-xs bg-slate-50 font-black"></div>
                    <div><label class="text-[10px] text-slate-400 mb-2 block font-black uppercase uppercase">Prazo</label><input type="date" id="data_conclusao" required class="w-full p-4 border rounded-xl text-xs bg-slate-50 font-black uppercase"></div>
                </div>
                <div class="pt-6 font-black uppercase">
                    <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition uppercase tracking-widest text-sm uppercase">Gravar na Nuvem</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL EDIÇÃO -->
    <div id="modal-edit" class="hidden fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8 border border-slate-200">
            <h3 class="text-xl mb-6 font-black flex justify-between uppercase">Editar Ação <button onclick="fecharModal()" class="text-slate-400 font-black">✕</button></h3>
            <form id="form-edit" class="space-y-4">
                <input type="hidden" id="edit-id">
                <input type="text" id="edit-titulo" class="w-full p-3 border-2 border-slate-100 rounded-xl font-black outline-none uppercase">
                <select id="edit-responsavel" class="w-full p-3 border-2 border-slate-100 rounded-xl font-black outline-none uppercase"></select>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="edit-data-inicio" class="w-full p-3 border rounded-lg text-xs font-black uppercase">
                    <input type="date" id="edit-data-fim" class="w-full p-3 border rounded-lg text-xs font-black uppercase">
                </div>
                <div class="pt-4 space-y-3 font-black">
                    <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl shadow-lg uppercase font-black uppercase">Salvar Mudanças</button>
                    <button type="button" onclick="deletarPlanoNoModal()" class="w-full bg-red-50 text-red-600 py-3 rounded-xl font-black text-xs border border-red-200 uppercase">Excluir Plano Definitivamente</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CONFIGURAÇÕES -->
    <div id="modal-config" class="hidden fixed inset-0 bg-slate-900/80 z-[120] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8 font-black uppercase">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black uppercase">Base de Dados</h3>
                <button onclick="fecharConfig()" class="text-red-500 text-2xl uppercase">✕</button>
            </div>
            <button onclick="importarNomesPadrao()" class="w-full bg-blue-100 text-blue-700 py-4 rounded-xl font-black mb-6 text-xs uppercase tracking-widest hover:bg-blue-200">Restaurar Nomes Originais</button>
            <div class="space-y-4 font-black uppercase">
                <div class="flex gap-2 font-black uppercase">
                    <input type="text" id="novo-nome" class="flex-1 p-3 border rounded-xl text-xs font-black" placeholder="Nome Completo">
                    <button onclick="adicionarNome()" class="bg-green-600 text-white px-6 rounded-xl font-black shadow">ADD</button>
                </div>
                <div id="lista-nomes-config" class="h-48 overflow-y-auto border-2 rounded-xl p-2 bg-slate-50 text-[10px] space-y-1"></div>
            </div>
        </div>
    </div>

    <!-- NAVEGAÇÃO -->
    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-40 font-black uppercase shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xl font-black uppercase tracking-tighter">B</div>
                <span class="text-slate-900 text-lg font-black tracking-tighter uppercase">Execute Pro <span class="text-blue-600">v23</span></span>
            </div>
            <div class="flex gap-6 text-[11px] items-center font-black uppercase">
                <button onclick="mudarAba('lista')" id="tab-ativos" class="aba-ativa font-black pb-1">Ativos</button>
                <button onclick="mudarAba('concluidos')" id="tab-concluidos" class="font-black pb-1">Concluídos</button>
                <button onclick="mudarAba('dashboard')" id="tab-dash" class="font-black pb-1">BI</button>
                <button onclick="verificarSenha()" id="btn-lock" class="bg-slate-100 px-4 py-2 rounded-lg text-red-600 font-black shadow-sm uppercase uppercase">🔒 Acesso</button>
                <button onclick="abrirConfig()" id="btn-config" class="hidden bg-slate-100 p-2 rounded-lg font-black uppercase">⚙️</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-10 font-black uppercase uppercase font-black uppercase font-black uppercase">
        
        <!-- BARRA DE CONTROLE -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 font-black uppercase">
            <div class="flex items-center gap-4 w-full md:w-auto font-black uppercase">
                <select id="filtro-pessoa" onchange="renderLista()" class="bg-white border-2 border-slate-200 p-3 rounded-xl text-xs font-black text-slate-700 outline-none w-full md:w-[350px] shadow-sm uppercase font-black uppercase"></select>
                <button onclick="limparFiltro()" class="text-[10px] text-slate-400 font-black hover:text-blue-600 uppercase font-black uppercase">Limpar</button>
            </div>
            <button onclick="toggleForm()" class="bg-blue-600 text-white px-10 py-4 rounded-xl font-black shadow-lg hover:bg-blue-700 transition w-full md:w-auto uppercase font-black font-black uppercase">+ Nova Ação</button>
        </div>

        <div id="metrics-bar" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bi-card p-4 text-center"><p class="text-[10px] text-slate-400 mb-1 uppercase font-black uppercase font-black uppercase">Total</p><h2 id="dash-total" class="text-2xl font-black font-black uppercase">0</h2></div>
            <div class="bi-card p-4 text-center border-l-8 border-red-500"><p class="text-[10px] text-red-500 mb-1 uppercase font-black uppercase font-black uppercase">Atraso</p><h2 id="dash-atrasados" class="text-2xl font-black font-black uppercase">0</h2></div>
            <div class="bi-card p-4 text-center border-l-8 border-yellow-400"><p class="text-[10px] text-yellow-600 mb-1 uppercase font-black uppercase font-black uppercase uppercase">Em curso</p><h2 id="dash-andamento" class="text-2xl font-black font-black uppercase font-black uppercase">0</h2></div>
            <div class="bi-card p-4 text-center border-l-8 border-green-500"><p class="text-[10px] text-green-600 mb-1 uppercase font-black uppercase font-black font-black uppercase">Finalizado</p><h2 id="dash-concluidos" class="text-2xl font-black font-black font-black uppercase font-black uppercase uppercase">0</h2></div>
        </div>

        <!-- LISTA -->
        <div id="aba-lista-container" class="grid grid-cols-1 gap-5">
            <div id="lista-planos" class="grid grid-cols-1 gap-5 font-black uppercase uppercase font-black uppercase font-black uppercase font-black uppercase"></div>
        </div>

        <!-- DASHBOARD BI -->
        <div id="aba-dashboard" class="hidden">
            <div class="bi-card p-10 h-[450px] flex justify-around items-end gap-4 relative">
                <div id="chart-container" class="flex justify-around items-end h-full w-full gap-6"></div>
            </div>
            <div class="bg-blue-600 text-white p-10 rounded-2xl mt-8 text-center shadow-2xl font-black uppercase">
                <p class="text-sm opacity-80 mb-2 uppercase">Taxa de Execução Global</p>
                <h2 id="dash-taxa" class="text-8xl font-black uppercase">0%</h2>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFka2_7e9ktqZ3omV8lHBBuzd1Wd88emA",
            authDomain: "executepro-ff108.firebaseapp.com",
            projectId: "executepro-ff108",
            storageBucket: "executepro-ff108.appspot.com",
            messagingSenderId: "862620727559",
            appId: "1:862620727559:web:4515840f5eea40c64f6da2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let dadosGerais = [];
        let abaAtual = 'lista';
        let gestorAutenticado = false;

        function toggleForm() { document.getElementById('drawer-form').classList.toggle('translate-x-full'); }
        function fecharModal() { document.getElementById('modal-edit').classList.add('hidden'); }
        function fecharConfig() { document.getElementById('modal-config').classList.add('hidden'); }
        function abrirConfig() { if (!gestorAutenticado) return alert("NEGADO"); document.getElementById('modal-config').classList.remove('hidden'); }

        function mudarAba(aba) {
            abaAtual = aba;
            document.getElementById('aba-lista-container').classList.toggle('hidden', aba === 'dashboard');
            document.getElementById('aba-dashboard').classList.toggle('hidden', aba !== 'dashboard');
            document.getElementById('tab-ativos').className = (aba === 'lista') ? 'aba-ativa font-black pb-1' : 'font-black pb-1';
            document.getElementById('tab-concluidos').className = (aba === 'concluidos') ? 'aba-ativa font-black pb-1' : 'font-black pb-1';
            document.getElementById('tab-dash').className = (aba === 'dashboard') ? 'aba-ativa font-black pb-1' : 'font-black pb-1';
            renderLista();
            if(aba === 'dashboard') renderDashboard();
        }

        function verificarSenha() {
            if (gestorAutenticado) { gestorAutenticado = false; atualizarPermissoes(); return; }
            if (prompt("SENHA GESTOR:") === "1570") { gestorAutenticado = true; atualizarPermissoes(); } else { alert("ERRO!"); }
        }

        function atualizarPermissoes() {
            const btn = document.getElementById('btn-lock');
            const btnConfig = document.getElementById('btn-config');
            btn.innerText = gestorAutenticado ? "🔓 Gestor" : "🔒 Acesso";
            btn.className = gestorAutenticado ? "bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg font-black uppercase" : "bg-slate-100 text-red-600 px-4 py-2 rounded-lg font-black uppercase";
            btnConfig.classList.toggle('hidden', !gestorAutenticado);
            renderLista(); 
        }

        async function deletarPlanoNoModal() {
            const id = document.getElementById('edit-id').value;
            if (confirm("EXCLUIR DEFINITIVAMENTE?")) { await db.collection("planos").doc(id).delete(); fecharModal(); }
        }

        db.collection("responsaveis").onSnapshot(snap => {
            const sp = document.getElementById('responsavel');
            const se = document.getElementById('edit-responsavel');
            const conf = document.getElementById('lista-nomes-config');
            sp.innerHTML = '<option value="" disabled selected>ESCOLHER...</option>';
            se.innerHTML = '<option value="" disabled selected>ESCOLHER...</option>';
            conf.innerHTML = '';
            snap.forEach(doc => {
                const n = doc.data().nome;
                sp.innerHTML += `<option value="${n}">${n}</option>`;
                se.innerHTML += `<option value="${n}">${n}</option>`;
                conf.innerHTML += `<div class="flex justify-between bg-white p-3 border rounded-xl mb-1 uppercase"><span>${n}</span><button onclick="excluirNome('${doc.id}')" class="text-red-500 font-black">✕</button></div>`;
            });
        });

        db.collection("planos").onSnapshot(snap => {
            document.getElementById('loading-overlay').classList.add('hidden');
            dadosGerais = [];
            snap.forEach(doc => dadosGerais.push({id: doc.id, ...doc.data()}));
            const f = document.getElementById('filtro-pessoa');
            const val = f.value || "TODOS";
            const nomes = [...new Set(dadosGerais.map(p => p.responsavel))].sort();
            f.innerHTML = '<option value="TODOS">TODOS OS RESPONSÁVEIS</option>';
            nomes.forEach(n => f.innerHTML += `<option value="${n}">${n}</option>`);
            f.value = val;
            renderLista();
            if(abaAtual === 'dashboard') renderDashboard();
        });

        function renderLista() {
            const lista = document.getElementById('lista-planos');
            const filtro = document.getElementById('filtro-pessoa').value;
            lista.innerHTML = '';
            
            let filtrados = dadosGerais.filter(p => (abaAtual === 'concluidos') ? p.status === 'Concluído' : p.status !== 'Concluído');
            if (filtro !== "TODOS") filtrados = filtrados.filter(p => p.responsavel === filtro);
            
            filtrados.forEach(p => {
                const diff = moment(p.data_conclusao).startOf('day').diff(moment().startOf('day'), 'days');
                
                let colorClass = "border-blue-600 bg-blue-50/20 shadow-blue-100"; // Default Blue
                let dotColor = "bg-blue-600";

                if (p.status === 'Concluído') {
                    colorClass = "border-green-600 bg-green-50/20 shadow-green-100";
                    dotColor = "bg-green-600";
                } else if (diff < 0) {
                    colorClass = "border-red-600 bg-red-50/20 shadow-red-200 critical-glow";
                    dotColor = "bg-red-600 animate-pulse";
                } else if (p.status === 'Em andamento') {
                    colorClass = "border-yellow-400 bg-yellow-50/20 shadow-yellow-100";
                    dotColor = "bg-yellow-400";
                }

                lista.innerHTML += `
                    <div class="bi-card p-6 border-l-[24px] ${colorClass} flex flex-col md:flex-row gap-6 items-center font-black transition-all hover:scale-[1.01]">
                        <div class="flex-1 w-full uppercase">
                            <div class="flex items-center gap-3 mb-2 uppercase font-black">
                                <div class="h-4 w-4 rounded-full ${dotColor} shadow-md border-2 border-white"></div>
                                <span class="text-slate-900 text-sm font-black uppercase">${p.responsavel}</span>
                                <span class="text-slate-400 text-[11px] ml-auto font-black uppercase">PRAZO: ${moment(p.data_conclusao).format('DD/MM/YYYY')}</span>
                            </div>
                            <h2 class="text-base text-slate-800 font-black mb-4 uppercase tracking-tighter">${p.titulo}</h2>
                            <textarea onblur="mudarObs('${p.id}', this.value)" class="w-full p-4 bg-white/60 border-2 border-white rounded-xl text-xs text-red-600 font-black outline-none focus:bg-white transition shadow-inner uppercase" placeholder="PENDÊNCIAS / BLOQUEIOS...">${p.observacao || ''}</textarea>
                        </div>
                        <div class="flex items-center gap-4 bg-white/50 p-4 rounded-2xl font-black uppercase">
                            <select onchange="mudarStatus('${p.id}', this.value)" class="p-3 border-2 border-white rounded-xl bg-white text-[11px] font-black uppercase">
                                <option ${p.status==='Não iniciado'?'selected':''}>Não iniciado</option>
                                <option ${p.status==='Em andamento'?'selected':''}>Em andamento</option>
                                <option ${p.status==='Concluído'?'selected':''}>Concluído</option>
                            </select>
                            <div class="flex gap-2 ${!gestorAutenticado ? 'hidden' : ''}">
                                <button onclick="abrirEdicao('${p.id}')" class="text-blue-600 text-4xl hover:scale-110 transition uppercase font-black">✏️</button>
                            </div>
                        </div>
                    </div>`;
            });
            atualizarMetrics();
        }

        async function mudarStatus(id, s) { await db.collection("planos").doc(id).update({ status: s }); }
        async function mudarObs(id, t) { await db.collection("planos").doc(id).update({ observacao: t.toUpperCase() }); }
        function limparFiltro() { document.getElementById('filtro-pessoa').value = "TODOS"; renderLista(); }
        function atualizarMetrics() { const t=dadosGerais.length, c=dadosGerais.filter(p=>p.status==='Concluído').length; document.getElementById('dash-total').innerText=t; document.getElementById('dash-concluidos').innerText=c; document.getElementById('dash-andamento').innerText=dadosGerais.filter(p=>p.status==='Em andamento').length; document.getElementById('dash-atrasados').innerText=dadosGerais.filter(p=>p.status!=='Concluído'&&moment(p.data_conclusao).diff(moment().startOf('day'),'days')<0).length; document.getElementById('dash-taxa').innerText=t>0?Math.round((c/t)*100)+"%":"0%"; }
        function renderDashboard() { const t=dadosGerais.length; const c=document.getElementById('chart-container'); c.innerHTML=''; [{key:'Não iniciado',label:'PENDENTE',color:'bg-blue-600'},{key:'Em andamento',label:'CURSO',color:'bg-yellow-400'},{key:'Concluído',label:'PRONTO',color:'bg-green-600'}].forEach(cfg=>{ const q=dadosGerais.filter(p=>p.status===cfg.key).length; const a=t>0?(q/t*100):0; c.innerHTML+=`<div class="flex flex-col items-center flex-1 h-full justify-end font-black uppercase"><span class="text-5xl mb-2">${q}</span><span class="text-xs text-slate-400 mb-6">${Math.round(a)}%</span><div class="column-bar w-32 md:w-48 ${cfg.color} rounded-t-3xl shadow-2xl" style="height: ${Math.max(a*3.5, 30)}px"></div><span class="mt-8 text-xs bg-white border-2 border-slate-100 px-8 py-3 rounded-full font-black uppercase font-black uppercase">${cfg.label}</span></div>`; }); }
        function abrirEdicao(id) { if (!gestorAutenticado) return; const p = dadosGerais.find(x => x.id === id); document.getElementById('edit-id').value = id; document.getElementById('edit-titulo').value = p.titulo; document.getElementById('edit-responsavel').value = p.responsavel; document.getElementById('edit-data-inicio').value = p.data_inicio; document.getElementById('edit-data-fim').value = p.data_conclusao; document.getElementById('modal-edit').classList.remove('hidden'); }
        async function adicionarNome() { const inp=document.getElementById('novo-nome'); if(inp.value.trim()){ await db.collection("responsaveis").add({nome: inp.value.trim().toUpperCase()}); inp.value=""; } }
        async function excluirNome(id) { if(confirm("REMOVER?")) await db.collection("responsaveis").doc(id).delete(); }
        async function importarNomesPadrao() { const lista=["RAFAEL JANUARIO CUNHA", "RICKSON CARMO", "ROMUALDO AZEVEDO", "LUIS DOMINGOS", "JOSÉ CLAUDIO REIS", "PAULO TEIXEIRA", "DEIVEDE LIMA"]; for(let n of lista) await db.collection("responsaveis").add({nome: n}); alert("OK!"); }
        const fP=document.getElementById('form-plano'); fP.addEventListener('submit', async(e)=>{ e.preventDefault(); await db.collection("planos").add({ titulo: document.getElementById('titulo').value.toUpperCase(), responsavel: document.getElementById('responsavel').value, data_inicio: document.getElementById('data_inicio').value, data_conclusao: document.getElementById('data_conclusao').value, status: "Não iniciado", observacao: "", timestamp: Date.now() }); fP.reset(); toggleForm(); });
        const fE=document.getElementById('form-edit'); fE.addEventListener('submit', async(e)=>{ e.preventDefault(); await db.collection("planos").doc(document.getElementById('edit-id').value).update({ titulo: document.getElementById('edit-titulo').value.toUpperCase(), responsavel: document.getElementById('edit-responsavel').value, data_inicio: document.getElementById('edit-data-inicio').value, data_conclusao: document.getElementById('edit-data-fim').value }); fecharModal(); });
    </script>
</body>
</html>
