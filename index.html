<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExecutePro v10 - Auditoria & Evidências</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <style>
        * { font-style: normal !important; } 
        .column-bar { transition: height 0.6s ease-in-out; min-width: 70px; }
        input, select, textarea { font-size: 13px !important; }
        .aba-ativa { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 900; }
        .btn-upload { position: relative; overflow: hidden; cursor: pointer; }
        .btn-upload input { position: absolute; font-size: 100px; right: 0; top: 0; opacity: 0; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 leading-tight uppercase font-black">
    <div id="loading-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center font-black text-white text-xl uppercase tracking-widest text-center px-4">Sincronizando Evidências Cloud...</div>

    <!-- MODAL DE EDIÇÃO -->
    <div id="modal-edit" class="hidden fixed inset-0 bg-slate-900/70 z-[90] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-xl shadow-2xl border-t-8 border-yellow-500 text-sm font-black uppercase">
            <div class="p-6">
                <h3 class="font-black mb-4 flex justify-between tracking-tighter italic font-black">Editar Ação <button onclick="fecharModal()" class="text-slate-400 hover:text-red-500 text-2xl font-normal font-black">✕</button></h3>
                <form id="form-edit" class="space-y-4 font-black uppercase">
                    <input type="hidden" id="edit-id">
                    <div><label class="text-[10px] text-slate-400 ml-1">Descrição</label><input type="text" id="edit-titulo" class="w-full p-2 border rounded-lg bg-slate-50 outline-none uppercase font-black tracking-tighter"></div>
                    <div><label class="text-[10px] text-slate-400 ml-1">Responsável</label><select id="edit-responsavel" class="w-full p-2 border rounded-lg bg-slate-50 outline-none uppercase font-black"></select></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[10px] text-slate-400 ml-1">Início</label><input type="date" id="edit-data-inicio" class="w-full p-2 border rounded-lg outline-none text-xs font-black uppercase"></div>
                        <div><label class="text-[10px] text-slate-400 ml-1 font-black uppercase">Prazo</label><input type="date" id="edit-data-fim" class="w-full p-2 border rounded-lg outline-none text-xs font-black uppercase"></div>
                    </div>
                    <div><label class="text-[10px] text-slate-400 ml-1">Pendência</label><input type="text" id="edit-obs" class="w-full p-2 border rounded-lg bg-slate-50 outline-none border-red-200 text-red-600 font-black"></div>
                    <button type="submit" class="w-full bg-yellow-500 text-white py-3 rounded-lg font-black uppercase text-sm shadow-lg tracking-widest">Salvar Alterações</button>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL DE VISUALIZAR FOTO -->
    <div id="modal-foto" class="hidden fixed inset-0 bg-slate-900/90 z-[100] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="max-w-4xl w-full flex flex-col items-center">
            <button onclick="fecharModalFoto()" class="self-end text-white bg-red-600 px-4 py-2 rounded-xl font-black mb-2 shadow-lg">FECHAR ✕</button>
            <img id="img-ampliada" class="max-h-[80vh] w-auto rounded-2xl shadow-2xl border-4 border-white shadow-black" src="">
        </div>
    </div>

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-40 shadow-xl border-b-2 border-blue-500 font-black uppercase tracking-tighter">
        <div class="container mx-auto flex justify-between items-center">
            <span class="text-blue-400 text-lg uppercase tracking-widest">Execute Pro <span class="text-white font-light text-[10px] ml-1 tracking-tighter uppercase">Audit v10</span></span>
            <div class="flex gap-6 text-[11px] items-center font-black">
                <button id="btn-lock" onclick="verificarSenha()" class="bg-red-600 px-3 py-1.5 rounded-md flex items-center gap-1 font-black">🔒 MODO LEITURA</button>
                <button onclick="mudarAba('lista')" id="tab-ativos" class="aba-ativa pb-1 transition">📝 Ativos</button>
                <button onclick="mudarAba('concluidos')" id="tab-concluidos" class="pb-1 transition">✅ Concluidos</button>
                <button onclick="mudarAba('dashboard')" id="tab-dash" class="pb-1 transition">📊 Dashboard</button>
                <button onclick="abrirConfig()" class="bg-slate-700 p-1.5 rounded-md">⚙️</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 uppercase font-black">
        <div id="aba-lista">
            <div class="flex flex-col lg:flex-row gap-6 font-black uppercase">
                <!-- FORMULÁRIO -->
                <div id="box-form" class="lg:w-1/3 bg-white p-6 rounded-2xl shadow-lg border-t-8 border-blue-600 h-fit font-black uppercase">
                    <h3 class="font-black mb-6 text-slate-800 text-[11px] uppercase tracking-widest border-b pb-2 italic font-black">Novo Plano de Ação</h3>
                    <form id="form-plano" class="space-y-4 font-black uppercase">
                        <input type="text" id="titulo" required class="w-full p-3 border rounded-xl text-xs bg-slate-50 font-black outline-none font-black uppercase" placeholder="Título da Tarefa">
                        <select id="responsavel" required class="w-full p-3 border rounded-xl text-xs bg-blue-50 font-black text-blue-900 outline-none uppercase font-black"></select>
                        <div class="grid grid-cols-2 gap-2 text-[10px] font-black text-slate-400">
                            <div>Data Início<input type="date" id="data_inicio" required class="w-full p-2 border rounded-lg text-[11px] text-gray-700 mt-1 outline-none font-black uppercase"></div>
                            <div>Prazo Final<input type="date" id="data_conclusao" required class="w-full p-2 border rounded-lg text-[11px] text-gray-700 mt-1 outline-none font-black uppercase"></div>
                        </div>
                        <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-black hover:bg-blue-700 shadow-md transition text-xs tracking-widest italic uppercase">Gravar na Nuvem</button>
                    </form>
                </div>

                <!-- LISTAGEM -->
                <div class="lg:w-2/3">
                    <div class="mb-4 bg-white p-3 rounded-xl shadow border border-slate-200 flex flex-col md:flex-row items-center gap-4">
                        <span class="text-[10px] font-black text-slate-400 tracking-widest">Filtrar por Responsável:</span>
                        <select id="filtro-pessoa" onchange="renderLista()" class="flex-1 p-2 border-2 border-blue-100 rounded-lg text-xs font-black bg-blue-50 text-blue-900 outline-none uppercase font-black cursor-pointer">
                            <option value="TODOS">MOSTRAR TODOS OS NOMES</option>
                        </select>
                        <button onclick="limparFiltro()" class="text-[9px] bg-slate-200 px-3 py-2 rounded font-black hover:bg-slate-300 transition uppercase font-black tracking-widest">Limpar</button>
                    </div>

                    <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-slate-200">
                        <div class="bg-slate-800 text-white p-3 text-[10px] font-black flex justify-between uppercase tracking-widest items-center">
                            <span id="txt-aba">Monitoramento de Execução</span>
                            <span class="text-blue-400 flex items-center gap-1 font-black underline tracking-tighter uppercase italic">Live Cloud Sync</span>
                        </div>
                        <div id="lista-planos" class="divide-y divide-slate-100 font-black uppercase tracking-tighter"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- DASHBOARD IGUAL (MESMO CÓDIGO) -->
        <div id="aba-dashboard" class="hidden font-black uppercase tracking-tighter">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 text-center font-black">
                <div class="bg-white p-4 rounded-2xl shadow border-b-4 border-blue-500 text-slate-400 text-[10px] font-black uppercase tracking-widest">TOTAL<h2 id="dash-total" class="text-2xl text-slate-800 font-black">0</h2></div>
                <div class="bg-white p-4 rounded-2xl shadow border-b-4 border-red-600 text-red-500 text-[10px] font-black uppercase tracking-widest">ATRASADOS<h2 id="dash-atrasados" class="text-2xl font-black italic">0</h2></div>
                <div class="bg-white p-4 rounded-2xl shadow border-b-4 border-yellow-500 text-yellow-600 text-[10px] font-black uppercase tracking-widest tracking-widest">EM CURSO<h2 id="dash-andamento" class="text-2xl font-black italic">0</h2></div>
                <div class="bg-white p-4 rounded-2xl shadow border-b-4 border-green-500 text-green-600 text-[10px] font-black uppercase tracking-widest">CONCLUÍDOS<h2 id="dash-concluidos" class="text-2xl font-black italic">0</h2></div>
            </div>
            <div id="chart-container" class="bg-white p-8 rounded-2xl shadow border h-80 flex justify-around items-end gap-4 relative font-black tracking-widest mb-4"></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 font-black tracking-widest uppercase">
                <div class="bg-blue-600 p-6 rounded-2xl text-center text-white"><p class="text-[10px] opacity-80 mb-1 font-black">Taxa Geral</p><h2 id="dash-taxa" class="text-5xl font-black italic uppercase">0%</h2></div>
                <div class="bg-white p-6 rounded-2xl shadow border"><h3 class="text-[10px] text-slate-400 border-b pb-2 mb-4 italic">Ranking Pendências</h3><div id="chart-responsavel" class="space-y-2 font-black italic"></div></div>
            </div>
        </div>

        <!-- CONFIGS -->
        <div id="config-section" class="hidden fixed inset-0 bg-slate-900/95 z-50 flex items-center justify-center p-4 uppercase font-black">
            <div class="bg-white p-8 rounded-2xl max-w-lg w-full shadow-2xl">
                <button onclick="fecharConfig()" class="float-right text-red-500 text-2xl font-black">✕</button>
                <h3 class="font-black mb-6 italic text-sm border-b pb-2 uppercase tracking-widest">Base de Dados</h3>
                <button onclick="importarNomesPadrao()" class="w-full bg-blue-100 text-blue-700 py-3 rounded-lg font-black mb-6 text-[10px] uppercase tracking-widest">Importar Lista Padrão de Nomes</button>
                <div class="space-y-4">
                    <div class="flex gap-2 text-xs uppercase font-black tracking-widest">
                        <input type="text" id="novo-nome" class="flex-1 p-2 border rounded-lg font-black uppercase tracking-widest" placeholder="Nome Completo">
                        <button onclick="adicionarNome()" class="bg-green-600 text-white px-6 rounded-lg font-black uppercase tracking-widest">ADD</button>
                    </div>
                    <div id="lista-nomes-config" class="h-48 overflow-y-auto border rounded-lg p-2 bg-slate-50 text-[10px] uppercase font-black tracking-widest"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFka2_7e9ktqZ3omV8lHBBuzd1Wd88emA",
            authDomain: "executepro-ff108.firebaseapp.com",
            projectId: "executepro-ff108",
            storageBucket: "executepro-ff108.appspot.com",
            messagingSenderId: "862620727559",
            appId: "1:862620727559:web:4515840f5eea40c64f6da2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let dadosGerais = [];
        let abaAtual = 'lista';
        let gestorAutenticado = false;

        function mudarAba(aba) {
            abaAtual = aba;
            document.getElementById('aba-lista').classList.toggle('hidden', aba === 'dashboard');
            document.getElementById('aba-dashboard').classList.toggle('hidden', aba !== 'dashboard');
            document.getElementById('tab-ativos').className = (aba === 'lista') ? 'aba-ativa pb-1 transition' : 'pb-1 transition';
            document.getElementById('tab-concluidos').className = (aba === 'concluidos') ? 'aba-ativa pb-1 transition' : 'pb-1 transition';
            document.getElementById('tab-dash').className = (aba === 'dashboard') ? 'aba-ativa pb-1 transition' : 'pb-1 transition';
            document.getElementById('txt-aba').innerText = (aba === 'concluidos') ? 'Evidências de Auditoria (Concluídos)' : 'Monitoramento de Execução';
            renderLista();
            if(aba === 'dashboard') renderDashboard();
        }

        function verificarSenha() {
            if (gestorAutenticado) { gestorAutenticado = false; alert("Bloqueado."); atualizarPermissoes(); return; }
            if (prompt("SENHA GESTOR:") === "1570") { gestorAutenticado = true; alert("LIBERADO!"); atualizarPermissoes(); } else { alert("ERRO!"); }
        }

        function atualizarPermissoes() {
            const btnLock = document.getElementById('btn-lock');
            btnLock.innerText = gestorAutenticado ? "🔓 MODO GESTOR" : "🔒 MODO LEITURA";
            btnLock.className = gestorAutenticado ? "bg-green-600 px-3 py-1.5 rounded-md font-black shadow-lg" : "bg-red-600 px-3 py-1.5 rounded-md font-black shadow-inner";
            renderLista(); 
        }

        function abrirConfig() { if (!gestorAutenticado) return alert("NEGADO!"); document.getElementById('config-section').classList.remove('hidden'); }
        function fecharConfig() { document.getElementById('config-section').classList.add('hidden'); }

        async function adicionarNome() {
            const input = document.getElementById('novo-nome');
            if (input.value.trim()) { await db.collection("responsaveis").add({ nome: input.value.trim().toUpperCase() }); input.value = ""; }
        }

        async function importarNomesPadrao() {
            const lista = ["RAFAEL JANUARIO CUNHA", "RICKSON CARMO", "ROMUALDO AZEVEDO", "LUIS DOMINGOS", "JOSÉ CLAUDIO REIS", "PAULO TEIXEIRA", "DEIVEDE LIMA"];
            for (let nome of lista) await db.collection("responsaveis").add({ nome: nome }); alert("OK!");
        }

        async function excluirNome(id) { if(confirm("REMOVER?")) await db.collection("responsaveis").doc(id).delete(); }

        const form = document.getElementById('form-plano');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await db.collection("planos").add({
                titulo: document.getElementById('titulo').value.toUpperCase(),
                responsavel: document.getElementById('responsavel').value,
                data_inicio: document.getElementById('data_inicio').value,
                data_conclusao: document.getElementById('data_conclusao').value,
                status: "Não iniciado", observacao: "", timestamp: Date.now(), evidenciaUrl: ""
            });
            form.reset(); alert("SALVO!");
        });

        // ARQUIVO / FOTOS
        async function uploadFoto(id, input) {
            const file = input.files[0];
            if (!file) return;
            const btn = input.parentElement;
            const originalText = btn.innerText;
            btn.innerText = "⏳ ENVIANDO...";

            const storageRef = storage.ref(`evidencias/${id}`);
            await storageRef.put(file);
            const url = await storageRef.getDownloadURL();
            
            await db.collection("planos").doc(id).update({ evidenciaUrl: url });
            btn.innerText = originalText;
            alert("EVIDÊNCIA SALVA COM SUCESSO!");
        }

        function ampliarFoto(url) {
            document.getElementById('img-ampliada').src = url;
            document.getElementById('modal-foto').classList.remove('hidden');
        }

        function fecharModalFoto() {
            document.getElementById('modal-foto').classList.add('hidden');
        }

        async function mudarObservacao(id, texto) { await db.collection("planos").doc(id).update({ observacao: texto.toUpperCase() }); }
        async function mudarStatus(id, status) { await db.collection("planos").doc(id).update({ status: status }); }

        function abrirEdicao(id) {
            if (!gestorAutenticado) return;
            const p = dadosGerais.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-titulo').value = p.titulo;
            document.getElementById('edit-responsavel').value = p.responsavel;
            document.getElementById('edit-data-inicio').value = p.data_inicio;
            document.getElementById('edit-data-fim').value = p.data_conclusao;
            document.getElementById('edit-obs').value = p.observacao || "";
            document.getElementById('modal-edit').classList.remove('hidden');
        }

        function fecharModal() { document.getElementById('modal-edit').classList.add('hidden'); }

        document.getElementById('form-edit').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            await db.collection("planos").doc(id).update({
                titulo: document.getElementById('edit-titulo').value.toUpperCase(),
                responsavel: document.getElementById('edit-responsavel').value,
                data_inicio: document.getElementById('edit-data-inicio').value,
                data_conclusao: document.getElementById('edit-data-fim').value,
                observacao: document.getElementById('edit-obs').value.toUpperCase()
            });
            fecharModal();
        });

        async function deletarPlano(id) { if (!gestorAutenticado) return; if(confirm("EXCLUIR?")) await db.collection("planos").doc(id).delete(); }

        // SINCRONIZAÇÃO
        db.collection("responsaveis").onSnapshot(snap => {
            const select = document.getElementById('responsavel');
            const selectEdit = document.getElementById('edit-responsavel');
            const config = document.getElementById('lista-nomes-config');
            select.innerHTML = '<option value="" disabled selected>ESCOLHER...</option>';
            selectEdit.innerHTML = ''; config.innerHTML = '';
            snap.forEach(doc => {
                const n = doc.data().nome;
                select.innerHTML += `<option value="${n}">${n}</option>`;
                selectEdit.innerHTML += `<option value="${n}">${n}</option>`;
                config.innerHTML += `<div class="flex justify-between items-center bg-white p-2 border mb-1 rounded-md font-black"><span>${n}</span><button onclick="excluirNome('${doc.id}')" class="text-red-500 font-black">✕</button></div>`;
            });
        });

        db.collection("planos").onSnapshot(snap => {
            document.getElementById('loading-overlay').classList.add('hidden');
            dadosGerais = [];
            snap.forEach(doc => dadosGerais.push({id: doc.id, ...doc.data()}));
            atualizarFiltroNomes();
            renderLista();
            if(abaAtual === 'dashboard') renderDashboard();
        });

        function atualizarFiltroNomes() {
            const filtro = document.getElementById('filtro-pessoa');
            const valorAtual = filtro.value;
            const nomesComAcao = [...new Set(dadosGerais.map(p => p.responsavel))].sort();
            filtro.innerHTML = '<option value="TODOS">MOSTRAR TODOS OS NOMES</option>';
            nomesComAcao.forEach(nome => { filtro.innerHTML += `<option value="${nome}">${nome}</option>`; });
            filtro.value = valorAtual;
        }

        function limparFiltro() { document.getElementById('filtro-pessoa').value = "TODOS"; renderLista(); }

        function renderLista() {
            const lista = document.getElementById('lista-planos');
            const filtro = document.getElementById('filtro-pessoa').value;
            lista.innerHTML = '';
            let filtrados = dadosGerais.filter(p => (abaAtual === 'concluidos') ? p.status === 'Concluído' : p.status !== 'Concluído');
            if (filtro !== "TODOS") filtrados = filtrados.filter(p => p.responsavel === filtro);
            
            filtrados.sort((a,b) => new Date(a.data_conclusao) - new Date(b.data_conclusao)).forEach(p => {
                const diff = moment(p.data_conclusao).startOf('day').diff(moment().startOf('day'), 'days');
                let cor = "bg-green-500";
                if (p.status === 'Concluído') cor = "bg-green-600";
                else if (p.status === 'Em andamento') cor = "bg-yellow-400 shadow-md";
                else { cor = "bg-blue-500"; if (diff < 0) cor = "bg-red-600 animate-pulse shadow-md shadow-red-200"; }

                // LOGICA DE EVIDENCIA (SÓ NA ABA CONCLUÍDOS)
                let areaEvidencia = "";
                if (abaAtual === 'concluidos') {
                    if (p.evidenciaUrl) {
                        areaEvidencia = `<button onclick="ampliarFoto('${p.evidenciaUrl}')" class="mt-2 bg-blue-100 text-blue-800 px-4 py-2 rounded-xl text-[10px] font-black border border-blue-300 shadow-sm flex items-center gap-2">🖼️ VER EVIDÊNCIA FOTOGRÁFICA</button>`;
                    } else {
                        areaEvidencia = `<div class="btn-upload mt-2 bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-[10px] font-black border border-dashed border-slate-300 shadow-inner flex items-center gap-2">📷 ANEXAR FOTO DE AUDITORIA <input type="file" accept="image/*" onchange="uploadFoto('${p.id}', this)"></div>`;
                    }
                }

                lista.innerHTML += `
                    <div class="p-4 bg-white flex flex-col lg:flex-row lg:items-center justify-between gap-4 border-l-[10px] ${p.status === 'Concluído' ? 'border-green-600' : (diff < 0 ? 'border-red-600' : 'border-slate-300')} shadow-sm font-black uppercase">
                        <div class="flex items-start gap-4 flex-1">
                            <div class="h-6 w-6 min-w-[1.5rem] rounded-full border-2 border-white shadow-lg ${cor} mt-1"></div>
                            <div class="flex-1">
                                <div class="text-[12px] font-black text-blue-700 uppercase italic mb-1">
                                    ${p.responsavel} <span class="text-slate-400 ml-4 font-black uppercase tracking-tighter uppercase font-black">📅 VENCIMENTO: ${moment(p.data_conclusao).format('DD/MM/YYYY')}</span>
                                </div>
                                <div class="text-[14px] font-black text-slate-800 uppercase leading-tight mb-2 tracking-tighter">${p.titulo}</div>
                                <textarea onblur="mudarObservacao('${p.id}', this.value)" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-[11px] font-black text-red-600 outline-none min-h-[40px] uppercase shadow-inner" placeholder="⚠️ PENDÊNCIAS...">${p.observacao || ''}</textarea>
                                ${areaEvidencia}
                            </div>
                        </div>
                        <div class="flex items-center justify-end gap-3 min-w-[220px] bg-slate-100 p-3 rounded-2xl">
                            <select onchange="mudarStatus('${p.id}', this.value)" class="text-[10px] border-2 rounded-xl bg-white p-2 font-black outline-none uppercase cursor-pointer flex-1">
                                <option ${p.status==='Não iniciado'?'selected':''}>Não iniciado</option>
                                <option ${p.status==='Em andamento'?'selected':''}>Em andamento</option>
                                <option ${p.status==='Concluído'?'selected':''}>Concluído</option>
                            </select>
                            <div class="flex gap-2 ${!gestorAutenticado ? 'hidden' : ''}">
                                <button onclick="abrirEdicao('${p.id}')" class="text-blue-600 text-2xl px-1 hover:scale-110 transition">✏️</button>
                                <button onclick="deletarPlano('${p.id}')" class="text-slate-400 hover:text-red-500 font-black text-xl px-1">✕</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function renderDashboard() {
            const total = dadosGerais.length;
            const concluidos = dadosGerais.filter(p => p.status === 'Concluído').length;
            const andamento = dadosGerais.filter(p => p.status === 'Em andamento').length;
            const atrasados = dadosGerais.filter(p => p.status !== 'Concluído' && moment(p.data_conclusao).diff(moment().startOf('day'), 'days') < 0).length;
            document.getElementById('dash-total').innerText = total;
            document.getElementById('dash-concluidos').innerText = concluidos;
            document.getElementById('dash-andamento').innerText = andamento;
            document.getElementById('dash-atrasados').innerText = atrasados;
            document.getElementById('dash-taxa').innerText = total > 0 ? Math.round((concluidos / total) * 100) + "%" : "0%";
            const chartCont = document.getElementById('chart-container'); chartCont.innerHTML = '';
            const config = [{ key: 'Não iniciado', label: 'PENDENTES', color: 'bg-blue-500' },{ key: 'Em andamento', label: 'EM CURSO', color: 'bg-yellow-400' },{ key: 'Concluído', label: 'FINALIZADOS', color: 'bg-green-500' }];
            config.forEach(cfg => {
                const qtd = dadosGerais.filter(p => p.status === cfg.key).length;
                const alturaPercent = total > 0 ? (qtd / total * 100) : 0;
                chartCont.innerHTML += `<div class="flex flex-col items-center flex-1 h-full justify-end font-black uppercase"><span class="text-3xl font-black">${qtd}</span><span class="text-[10px] text-slate-400 mb-2 font-black">${Math.round(alturaPercent)}%</span><div class="column-bar w-20 md:w-32 ${cfg.color} rounded-t-2xl shadow-xl" style="height: ${Math.max(alturaPercent*2.2, 15)}px"></div><span class="mt-4 text-[10px] font-black uppercase text-slate-500 bg-white px-4 py-1 rounded-full border shadow-sm">${cfg.label}</span></div>`;
            });
            const respStats = {}; dadosGerais.filter(p => p.status !== 'Concluído').forEach(p => { respStats[p.responsavel] = (respStats[p.responsavel] || 0) + 1; });
            const chartResp = document.getElementById('chart-responsavel'); chartResp.innerHTML = '';
            Object.entries(respStats).sort((a,b) => b[1] - a[1]).slice(0, 5).forEach(([nome, qtd]) => {
                chartResp.innerHTML += `<div class="flex justify-between items-center bg-white p-3 rounded-xl border-l-4 border-slate-900 shadow-md transition hover:scale-105 uppercase font-black italic"><span class="text-[10px] font-black italic tracking-tighter">${nome}</span><span class="bg-red-600 text-white px-3 py-1 rounded-lg text-[10px] font-black">${qtd} PENDÊNCIAS</span></div>`;
            });
        }
    </script>
</body>
</html>
