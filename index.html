<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExecutePro v20 - Master Estável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * { font-style: normal !important; font-family: 'Inter', sans-serif; font-weight: 900 !important; text-transform: uppercase !important; }
        .column-bar { transition: height 0.6s ease; min-width: 80px; }
        input, select, textarea { font-size: 14px !important; border-width: 2px !important; }
        .aba-ativa { border-bottom: 5px solid #3b82f6; color: #3b82f6; }
        .critical-glow { box-shadow: 0 0 15px rgba(220, 38, 38, 0.6); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 leading-tight">
    <div id="loading-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center text-white text-xl text-center px-4">SINCRONIZANDO DADOS CLOUD...</div>

    <!-- MODAL EDIÇÃO (RESTRITO GESTOR) -->
    <div id="modal-edit" class="hidden fixed inset-0 bg-slate-900/70 z-[90] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl border-t-[12px] border-yellow-500 p-8">
            <h3 class="text-xl mb-6 flex justify-between">EDITAR PLANO <button onclick="fecharModal()" class="text-slate-400">✕</button></h3>
            <form id="form-edit" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div><label class="text-[10px] text-slate-400">TÍTULO</label><input type="text" id="edit-titulo" class="w-full p-3 border rounded-xl bg-slate-50 outline-none"></div>
                <div><label class="text-[10px] text-slate-400">RESPONSÁVEL</label><select id="edit-responsavel" class="w-full p-3 border rounded-xl bg-slate-50 outline-none"></select></div>
                <div class="grid grid-cols-2 gap-4 font-black">
                    <div><label class="text-[10px] text-slate-400 font-black">INÍCIO</label><input type="date" id="edit-data-inicio" class="w-full p-3 border rounded-xl outline-none font-black uppercase"></div>
                    <div><label class="text-[10px] text-slate-400 uppercase font-black uppercase">PRAZO</label><input type="date" id="edit-data-fim" class="w-full p-3 border rounded-xl outline-none font-black uppercase"></div>
                </div>
                <button type="submit" class="w-full bg-yellow-500 text-white py-4 rounded-xl shadow-lg font-black uppercase">SALVAR ALTERAÇÕES</button>
            </form>
        </div>
    </div>

    <nav class="bg-slate-900 text-white p-5 sticky top-0 z-40 shadow-2xl border-b-4 border-blue-600 font-black uppercase">
        <div class="container mx-auto flex justify-between items-center font-black uppercase">
            <span class="text-blue-400 text-xl font-black uppercase tracking-tighter">EXECUTE PRO <span class="text-white text-[10px] ml-1 opacity-50 font-black uppercase">v20 ESTÁVEL</span></span>
            <div class="flex gap-8 text-[11px] items-center font-black uppercase tracking-widest">
                <button id="btn-lock" onclick="verificarSenha()" class="bg-red-600 px-4 py-2 rounded-xl shadow-inner font-black uppercase">🔒 LEITURA</button>
                <button onclick="mudarAba('lista')" id="tab-ativos" class="aba-ativa transition font-black uppercase">📝 ATIVOS</button>
                <button onclick="mudarAba('concluidos')" id="tab-concluidos" class="transition font-black uppercase">✅ CONCLUÍDOS</button>
                <button onclick="mudarAba('dashboard')" id="tab-dash" class="transition font-black uppercase tracking-tighter">📊 DASHBOARD</button>
                <button onclick="abrirConfig()" class="bg-slate-700 p-2 rounded-xl font-black uppercase">⚙️</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 lg:p-8 font-black uppercase">
        <!-- FILTRO GLOBAL -->
        <div class="mb-6 bg-white p-4 rounded-2xl shadow border flex flex-col md:flex-row items-center gap-4 font-black uppercase">
            <span class="text-[10px] text-slate-400 tracking-widest font-black uppercase">FILTRAR POR RESPONSÁVEL:</span>
            <select id="filtro-pessoa" onchange="renderLista()" class="flex-1 p-3 border-2 border-blue-50 rounded-xl text-sm bg-blue-50 text-blue-900 outline-none cursor-pointer font-black uppercase"></select>
            <button onclick="limparFiltro()" class="text-[10px] bg-slate-200 px-6 py-3 rounded-xl hover:bg-slate-300 font-black uppercase uppercase font-black">LIMPAR</button>
        </div>

        <div id="aba-lista-container" class="flex flex-col lg:flex-row gap-8 font-black uppercase">
            <!-- BOX FORM -->
            <div id="box-form" class="lg:w-1/3 bg-white p-8 rounded-3xl shadow-xl border-t-[12px] border-blue-600 h-fit sticky top-28 font-black uppercase uppercase font-black uppercase">
                <h3 class="text-xs mb-8 text-slate-800 border-b-2 pb-4 tracking-widest font-black uppercase italic font-black uppercase">NOVO PLANO DE AÇÃO</h3>
                <form id="form-plano" class="space-y-6 font-black uppercase">
                    <input type="text" id="titulo" required class="w-full p-4 border-2 rounded-2xl text-sm bg-slate-50 font-black outline-none focus:border-blue-600 font-black uppercase" placeholder="O QUE DEVE SER FEITO?">
                    <select id="responsavel" required class="w-full p-4 border-2 rounded-2xl text-sm bg-blue-50 text-blue-900 font-black outline-none cursor-pointer uppercase font-black font-black"></select>
                    <div class="grid grid-cols-2 gap-4 text-[10px] text-slate-400 font-black uppercase uppercase font-black uppercase">
                        <div>INÍCIO<input type="date" id="data_inicio" required class="w-full p-3 border-2 rounded-xl text-xs text-gray-700 mt-1 outline-none uppercase font-black"></div>
                        <div>PRAZO FINAL<input type="date" id="data_conclusao" required class="w-full p-3 border-2 rounded-xl text-xs text-gray-700 mt-1 outline-none uppercase font-black"></div>
                    </div>
                    <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition tracking-widest font-black uppercase uppercase italic font-black uppercase font-black uppercase">GRAVAR NA NUVEM</button>
                </form>
            </div>

            <!-- LISTAGEM -->
            <div id="box-lista" class="lg:w-2/3 space-y-4 font-black uppercase">
                <div class="bg-slate-800 text-white p-4 rounded-t-3xl text-[10px] flex justify-between items-center tracking-widest font-black uppercase uppercase font-black uppercase uppercase font-black">
                    <span id="txt-aba">MONITORAMENTO DE EXECUÇÃO</span>
                    <span class="text-blue-400 font-black underline uppercase uppercase uppercase font-black tracking-widest italic font-black">LIVE CLOUD SYNC 📡</span>
                </div>
                <div id="lista-planos" class="space-y-4 font-black uppercase font-black uppercase font-black uppercase font-black uppercase"></div>
            </div>
        </div>

        <!-- DASHBOARD BI -->
        <div id="aba-dashboard" class="hidden space-y-8 font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 text-center font-black uppercase font-black uppercase font-black uppercase">
                <div class="bg-white p-6 rounded-3xl shadow border-b-8 border-blue-500 font-black uppercase">TOTAL<h2 id="dash-total" class="text-4xl text-slate-800 font-black uppercase">0</h2></div>
                <div class="bg-white p-6 rounded-3xl shadow border-b-8 border-red-600 font-black uppercase text-red-500 font-black uppercase">ATRASADOS<h2 id="dash-atrasados" class="text-4xl font-black uppercase uppercase font-black uppercase">0</h2></div>
                <div class="bg-white p-6 rounded-3xl shadow border-b-8 border-yellow-500 font-black uppercase text-yellow-600 font-black uppercase font-black uppercase">EM CURSO<h2 id="dash-andamento" class="text-4xl font-black uppercase font-black uppercase font-black uppercase">0</h2></div>
                <div class="bg-white p-6 rounded-3xl shadow border-b-8 border-green-500 font-black uppercase text-green-600 font-black uppercase font-black uppercase">CONCLUÍDOS<h2 id="dash-concluidos" class="text-4xl font-black uppercase uppercase font-black uppercase font-black">0</h2></div>
            </div>
            <div class="bg-white p-12 rounded-3xl shadow border h-96 flex justify-around items-end gap-6 relative px-10 font-black uppercase font-black uppercase font-black uppercase font-black">
                <div id="chart-container" class="flex justify-around items-end h-full w-full gap-4 relative"></div>
            </div>
            <div class="bg-blue-600 p-10 rounded-3xl text-center text-white shadow-xl font-black uppercase font-black uppercase font-black uppercase font-black">
                <p class="text-xs font-black uppercase opacity-80 mb-2 font-black uppercase font-black uppercase font-black uppercase">TAXA DE EXECUÇÃO DA EQUIPE</p>
                <h2 id="dash-taxa" class="text-7xl font-black uppercase font-black uppercase font-black uppercase font-black">0%</h2>
            </div>
        </div>

        <!-- CONFIGS -->
        <div id="config-section" class="hidden fixed inset-0 bg-slate-900/95 z-50 flex items-center justify-center p-4">
            <div class="bg-white p-10 rounded-3xl max-w-xl w-full shadow-2xl font-black uppercase">
                <button onclick="fecharConfig()" class="float-right text-red-500 text-3xl font-black uppercase">✕</button>
                <h3 class="mb-8 text-lg border-b-2 pb-4 tracking-widest font-black uppercase">GESTÃO DE BASE</h3>
                <button onclick="importarNomesPadrao()" class="w-full bg-blue-100 text-blue-700 py-4 rounded-xl mb-8 text-xs tracking-widest font-black uppercase">IMPORTAR NOMES PADRÃO</button>
                <div class="space-y-6">
                    <div class="flex gap-4">
                        <input type="text" id="novo-nome" class="flex-1 p-4 border-2 rounded-2xl outline-none font-black uppercase uppercase font-black" placeholder="NOME COMPLETO">
                        <button onclick="adicionarNome()" class="bg-green-600 text-white px-8 rounded-2xl shadow-lg font-black uppercase uppercase font-black uppercase">ADD</button>
                    </div>
                    <div id="lista-nomes-config" class="h-64 overflow-y-auto border-2 rounded-2xl p-4 bg-slate-50 space-y-2 font-black uppercase font-black uppercase font-black"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCFka2_7e9ktqZ3omV8lHBBuzd1Wd88emA",
            authDomain: "executepro-ff108.firebaseapp.com",
            projectId: "executepro-ff108",
            storageBucket: "executepro-ff108.appspot.com",
            messagingSenderId: "862620727559",
            appId: "1:862620727559:web:4515840f5eea40c64f6da2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let dadosGerais = [];
        let abaAtual = 'lista';
        let gestorAutenticado = false;

        function mudarAba(aba) {
            abaAtual = aba;
            const boxForm = document.getElementById('box-form');
            const boxLista = document.getElementById('box-lista');
            document.getElementById('aba-lista-container').classList.toggle('hidden', aba === 'dashboard');
            document.getElementById('aba-dashboard').classList.toggle('hidden', aba !== 'dashboard');
            
            if (aba === 'concluidos') {
                boxForm.classList.add('hidden'); boxLista.classList.replace('lg:w-2/3', 'w-full');
                document.getElementById('txt-aba').innerText = 'HISTÓRICO DE AÇÕES FINALIZADAS';
            } else {
                boxForm.classList.remove('hidden'); boxLista.classList.replace('w-full', 'lg:w-2/3');
                document.getElementById('txt-aba').innerText = 'MONITORAMENTO DE EXECUÇÃO';
            }
            document.getElementById('tab-ativos').className = (aba === 'lista') ? 'aba-ativa font-black pb-1' : 'font-black pb-1';
            document.getElementById('tab-concluidos').className = (aba === 'concluidos') ? 'aba-ativa font-black pb-1' : 'font-black pb-1';
            document.getElementById('tab-dash').className = (aba === 'dashboard') ? 'aba-ativa font-black pb-1' : 'font-black pb-1';
            renderLista();
            if(aba === 'dashboard') renderDashboard();
        }

        function verificarSenha() {
            if (gestorAutenticado) { gestorAutenticado = false; atualizarPermissoes(); return; }
            if (prompt("SENHA GESTOR:") === "1570") { gestorAutenticado = true; atualizarPermissoes(); } else { alert("NEGADO!"); }
        }

        function atualizarPermissoes() {
            const btn = document.getElementById('btn-lock');
            btn.innerText = gestorAutenticado ? "🔓 MODO GESTOR" : "🔒 MODO LEITURA";
            btn.className = gestorAutenticado ? "bg-green-600 px-4 py-2 rounded-xl shadow-lg font-black uppercase" : "bg-red-600 px-4 py-2 rounded-xl shadow-inner font-black uppercase";
            renderLista(); 
        }

        async function mudarStatus(id, status) { await db.collection("planos").doc(id).update({ status }); }
        async function mudarObs(id, texto) { await db.collection("planos").doc(id).update({ observacao: texto.toUpperCase() }); }

        function abrirEdicao(id) {
            if (!gestorAutenticado) return;
            const p = dadosGerais.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-titulo').value = p.titulo;
            document.getElementById('edit-responsavel').value = p.responsavel;
            document.getElementById('edit-data-inicio').value = p.data_inicio;
            document.getElementById('edit-data-fim').value = p.data_conclusao;
            document.getElementById('modal-edit').classList.remove('hidden');
        }

        function fecharModal() { document.getElementById('modal-edit').classList.add('hidden'); }

        document.getElementById('form-edit').addEventListener('submit', async (e) => {
            e.preventDefault();
            await db.collection("planos").doc(document.getElementById('edit-id').value).update({
                titulo: document.getElementById('edit-titulo').value.toUpperCase(),
                responsavel: document.getElementById('edit-responsavel').value,
                data_inicio: document.getElementById('edit-data-inicio').value,
                data_conclusao: document.getElementById('edit-data-fim').value
            });
            fecharModal();
        });

        async function deletarPlano(id) { if (!gestorAutenticado) return; if(confirm("EXCLUIR?")) await db.collection("planos").doc(id).delete(); }

        const form = document.getElementById('form-plano');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await db.collection("planos").add({
                titulo: document.getElementById('titulo').value.toUpperCase(),
                responsavel: document.getElementById('responsavel').value,
                data_inicio: document.getElementById('data_inicio').value,
                data_conclusao: document.getElementById('data_conclusao').value,
                status: "Não iniciado", observacao: "", timestamp: Date.now()
            });
            form.reset();
        });

        db.collection("responsaveis").onSnapshot(snap => {
            const selectP = document.getElementById('responsavel');
            const selectE = document.getElementById('edit-responsavel');
            const config = document.getElementById('lista-nomes-config');
            selectP.innerHTML = '<option value="" disabled selected>ESCOLHER RESPONSÁVEL...</option>';
            selectE.innerHTML = '<option value="" disabled selected>ESCOLHER...</option>';
            config.innerHTML = '';
            snap.forEach(doc => {
                const n = doc.data().nome;
                selectP.innerHTML += `<option value="${n}">${n}</option>`;
                selectE.innerHTML += `<option value="${n}">${n}</option>`;
                config.innerHTML += `<div class="flex justify-between items-center bg-white p-3 border-2 rounded-xl mb-1 text-xs font-black uppercase"><span>${n}</span><button onclick="excluirNome('${doc.id}')" class="text-red-500 font-black">✕</button></div>`;
            });
        });

        db.collection("planos").onSnapshot(snap => {
            document.getElementById('loading-overlay').classList.add('hidden');
            dadosGerais = [];
            snap.forEach(doc => dadosGerais.push({id: doc.id, ...doc.data()}));
            
            const filtroS = document.getElementById('filtro-pessoa');
            const atualVal = filtroS.value || "TODOS";
            const nomesFiltro = [...new Set(dadosGerais.map(p => p.responsavel))].sort();
            filtroS.innerHTML = '<option value="TODOS">MOSTRAR TODOS OS NOMES</option>';
            nomesFiltro.forEach(n => filtroS.innerHTML += `<option value="${n}">${n}</option>`);
            filtroS.value = atualVal;

            renderLista();
            if(abaAtual === 'dashboard') renderDashboard();
        });

        function renderLista() {
            const lista = document.getElementById('lista-planos');
            const filtro = document.getElementById('filtro-pessoa').value;
            lista.innerHTML = '';
            let filtrados = dadosGerais.filter(p => (abaAtual === 'concluidos') ? p.status === 'Concluído' : p.status !== 'Concluído');
            if (filtro !== "TODOS") filtrados = filtrados.filter(p => p.responsavel === filtro);
            
            filtrados.forEach(p => {
                const diff = moment(p.data_conclusao).startOf('day').diff(moment().startOf('day'), 'days');
                let cor = "bg-green-500";
                if (p.status === 'Concluído') cor = "bg-green-600 shadow-md";
                else if (p.status === 'Em andamento') cor = "bg-yellow-400 shadow-md";
                else { cor = "bg-blue-500 shadow-md"; if (diff < 0) cor = "bg-red-600 animate-pulse critical-glow"; }

                lista.innerHTML += `
                    <div class="p-6 bg-white rounded-3xl shadow-xl border-l-[14px] ${p.status === 'Concluído' ? 'border-green-500' : (diff < 0 ? 'border-red-600' : 'border-slate-300')} flex flex-col md:flex-row gap-6 items-start md:items-center font-black uppercase">
                        <div class="flex-1 w-full font-black uppercase">
                            <div class="flex items-center gap-3 mb-2 font-black uppercase">
                                <div class="h-5 w-5 rounded-full ${cor} border-2 border-white font-black uppercase"></div>
                                <span class="text-sm text-blue-700 font-black uppercase uppercase">${p.responsavel}</span>
                                <span class="text-[11px] text-slate-400 font-black ml-auto font-black uppercase uppercase uppercase font-black uppercase font-black uppercase font-black uppercase">📅 VENCIMENTO: ${moment(p.data_conclusao).format('DD/MM/YYYY')}</span>
                            </div>
                            <h2 class="text-base text-slate-800 tracking-tighter mb-4 font-black uppercase font-black uppercase uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase">${p.titulo}</h2>
                            <textarea onblur="mudarObs('${p.id}', this.value)" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xs text-red-600 min-h-[60px] font-black uppercase font-black uppercase uppercase font-black uppercase font-black uppercase font-black uppercase outline-none focus:bg-white" placeholder="⚠️ PENDÊNCIAS / OBSERVAÇÕES...">${p.observacao || ''}</textarea>
                        </div>
                        <div class="w-full md:w-auto flex items-center gap-4 bg-slate-100 p-4 rounded-3xl font-black uppercase uppercase font-black uppercase font-black uppercase font-black uppercase">
                            <select onchange="mudarStatus('${p.id}', this.value)" class="flex-1 p-3 border-2 border-white rounded-xl bg-white text-xs font-black uppercase font-black uppercase font-black uppercase font-black uppercase">
                                <option ${p.status==='Não iniciado'?'selected':''}>Não iniciado</option>
                                <option ${p.status==='Em andamento'?'selected':''}>Em andamento</option>
                                <option ${p.status==='Concluído'?'selected':''}>Concluído</option>
                            </select>
                            <div class="flex gap-2 ${!gestorAutenticado ? 'hidden' : ''}">
                                <button onclick="abrirEdicao('${p.id}')" class="text-blue-600 text-3xl font-black px-2 uppercase uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase">✏️</button>
                                <button onclick="deletarPlano('${p.id}')" class="text-red-500 text-3xl font-black px-2 uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase">✕</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function renderDashboard() {
            const t = dadosGerais.length, c = dadosGerais.filter(p => p.status === 'Concluído').length;
            document.getElementById('dash-total').innerText = t;
            document.getElementById('dash-concluidos').innerText = c;
            document.getElementById('dash-andamento').innerText = dadosGerais.filter(p => p.status === 'Em andamento').length;
            document.getElementById('dash-atrasados').innerText = dadosGerais.filter(p => p.status !== 'Concluído' && moment(p.data_conclusao).diff(moment().startOf('day'), 'days') < 0).length;
            document.getElementById('dash-taxa').innerText = t > 0 ? Math.round((c/t)*100)+"%" : "0%";
            const cont = document.getElementById('chart-container'); cont.innerHTML = '';
            [{key:'Não iniciado',label:'PENDENTE',color:'bg-blue-500'},{key:'Em andamento',label:'EM CURSO',color:'bg-yellow-400'},{key:'Concluído',label:'FINALIZADO',color:'bg-green-500'}].forEach(cfg => {
                const qtd = dadosGerais.filter(p => p.status === cfg.key).length;
                const alt = t > 0 ? (qtd/t*100) : 0;
                cont.innerHTML += `<div class="flex flex-col items-center flex-1 h-full justify-end font-black"><span class="text-4xl mb-1">${qtd}</span><span class="text-sm text-slate-400 mb-4">${Math.round(alt)}%</span><div class="column-bar w-24 md:w-40 ${cfg.color} rounded-t-3xl shadow-2xl" style="height: ${Math.max(alt*3, 20)}px"></div><span class="mt-8 text-xs bg-slate-100 px-6 py-2 rounded-full border-2 border-slate-300 font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase font-black uppercase">${cfg.label}</span></div>`;
            });
        }

        function abrirConfig() { if (!gestorAutenticado) return alert("NEGADO!"); document.getElementById('config-section').classList.remove('hidden'); }
        function fecharConfig() { document.getElementById('config-section').classList.add('hidden'); }
        async function adicionarNome() { const i = document.getElementById('novo-nome'); if (i.value.trim()) { await db.collection("responsaveis").add({ nome: i.value.trim().toUpperCase() }); i.value = ""; } }
        async function excluirNome(id) { if(confirm("REMOVER?")) await db.collection("responsaveis").doc(id).delete(); }
        async function importarNomesPadrao() { const lista = ["RAFAEL JANUARIO CUNHA", "RICKSON CARMO", "ROMUALDO AZEVEDO", "LUIS DOMINGOS", "JOSÉ CLAUDIO REIS", "PAULO TEIXEIRA", "DEIVEDE LIMA"]; for (let n of lista) await db.collection("responsaveis").add({ nome: n }); alert("OK!"); }
        function limparFiltro() { document.getElementById('filtro-pessoa').value = "TODOS"; renderLista(); }
    </script>
</body>
</html>
